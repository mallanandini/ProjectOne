{% extends 'base.html' %}

{% block content %}

<h2>Students</h2>

<a href="{% url 'add_student' %}" class="btn btn-success mb-3">Add Student</a>

<input type="text" id="search" class="form-control mb-3" placeholder="Search students...">

<div class='row'>
    {% for student in students %}
    <div class='col-md-4 mb-3'>
        <div class='card p-3 mb-3'>
            <h4>{{ student.name }}</h4>
            <p>{{ student.email }}</p>
            <p>{{student.course }}</p>

            <a href="{% url 'update_student' student.id %}" class="btn btn-warning">Update</a>
            <a href="{% url 'delete_student' student.id %}" class="btn btn-danger" onclick="return confirmDelete()">Delete</a>
            
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
